name: aios

x-aios-service: &aios-service
  image: ${AIOS_IMAGE:-aios:latest}
  build:
    context: .
    dockerfile: Dockerfile
  env_file:
    - ${AIOS_ENV_FILE:-.env.production}
  restart: unless-stopped
  volumes:
    - aios_data:/app/data
  depends_on:
    migrate:
      condition: service_completed_successfully
    redis:
      condition: service_healthy
    qdrant:
      condition: service_healthy

services:
  postgres:
    image: postgres:16-alpine
    env_file:
      - ${AIOS_ENV_FILE:-.env.production}
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [backend]

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--save", "60", "1"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [backend]

  qdrant:
    image: qdrant/qdrant:v1.15.4
    restart: unless-stopped
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/127.0.0.1/6333'"]
      interval: 10s
      timeout: 5s
      retries: 15
    networks: [backend]

  migrate:
    image: ${AIOS_IMAGE:-aios:latest}
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - ${AIOS_ENV_FILE:-.env.production}
    command: ["python", "-m", "app.migrate"]
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy
    networks: [backend]

  app:
    <<: *aios-service
    command: ["python", "-m", "app.main"]
    expose: ["8000"]
    networks: [backend, edge]

  worker:
    <<: *aios-service
    command: ["python", "-m", "app.workers", "--worker", "all", "--poll-timeout", "2"]
    healthcheck:
      disable: true
    networks: [backend]

  scheduler:
    <<: *aios-service
    command: ["python", "-m", "app.workers", "--worker", "scheduler", "--poll-timeout", "5"]
    healthcheck:
      disable: true
    networks: [backend]

  monitoring:
    <<: *aios-service
    command: ["python", "-m", "app.workers", "--worker", "health", "--poll-timeout", "5"]
    healthcheck:
      disable: true
    networks: [backend]

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      app:
        condition: service_healthy
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./deploy/certs:/etc/nginx/certs:ro
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks: [edge]

  cloudflared:
    image: cloudflare/cloudflared:latest
    profiles: ["tunnel"]
    env_file:
      - ${AIOS_ENV_FILE:-.env.production}
    command: ["tunnel", "--no-autoupdate", "run"]
    restart: unless-stopped
    depends_on:
      nginx:
        condition: service_healthy
    networks: [edge]

volumes:
  postgres_data:
  redis_data:
  qdrant_data:
  aios_data:

networks:
  backend:
    internal: true
  edge: